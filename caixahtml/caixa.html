<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> CAIXA LIVRE </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
            .topo{
                background-color: #ffc107;
                text-align:center;
                font-size: 32px;
                font-weight: bold;
                border: 4px solid blue;
            }

            .painel{
                background: gray;
                padding: 100;
                margin-bottom: 10px;
                border: 3px solid black;
            }
    </style>
</head>

<body class="bg-primary bg-gradient">
<div id="Alert"><br></div>

<div class="container-mt-3">
    <div class="topo"> CAIXA LIVRE </div>

    <div class="row mt-3">

        <div class="col-md-7">
            <h3 class="text-white"><span class="badge text-bg-primary">SUA COMPRA🤣</span></h3>
            <ul id="lista" class="list-group lista"></ul>
        </div>
   
        <div class="col-md-5">
            <div class="painel">Total: R$ <span id="Total">0.00</span></div>
        
            <div class="painel">
                <label> codigo de barras </label>
                <!-- CORRIGIDO: "from-control" → "form-control" -->
                <input type="text" id="cod" class="form-control">
            </div>

            <div class="painel">
                <label> quantidade </label>
                <!-- CORRIGIDO: "from-control" → "form-control" -->
                <input type="text" id="qtd" class="form-control" value="1">
            </div>

            <div class="painel">
                <label> quantidade X valor </label>
                <div class="alert alert-light" role="alert"><span id="qtdXun">0.00</span></div>
            </div>
            <div class="painel">
    <button class="btn btn-success w-100" onclick="addProduto()">ADICIONAR</button>
</div>
        </div>

    </div>
</div>

<script>
    const produto = {
        "123": {"nome": "Banana", "preco": 24.00},
        "321": {"nome": "Limão",  "preco": 10.90},
        "987": {"nome": "Maça",   "preco": 39.90}
    }

    let carrinho = [];

    const audio = new Audio("bip.mp3");

    window.onload = () => {
        document.getElementById("cod").focus();
    }

    function addProduto() {
        const codValue = document.getElementById("cod");
        const qtdValue = document.getElementById("qtd");

        const codigo   = codValue.value;
        const quantidade = qtdValue.value;

        if (!produto[codigo]) {
            AlertItem();
            return;
        }

        const produtoBase = produto[codigo];
        const item = {
            nome:     produtoBase.nome,
            preco:    produtoBase.preco,
            quantidade: quantidade,
            subTotal: produtoBase.preco * quantidade
        }

        carrinho.push(item);
        audio.currentTime = 0;
        audio.play();

        atualizarTela();
    }

    function atualizarTela() {
        // CORRIGIDO: faltava "document." antes de getElementById
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        let total = 0;

        carrinho.forEach((item, index) => {
            total += item.subTotal;

            const li = document.createElement("li");
            li.className = "list-group-item";

            // CORRIGIDO: "d-fle" → "d-flex"
            li.innerHTML = `
                <div class="d-flex justify-content-between"><strong>${item.nome}</strong>
                <small>${item.quantidade} X ${item.preco} = <strong>${item.subTotal}</strong></small></div>`;

            lista.appendChild(li);
        });

        // CORRIGIDO: total agora é atualizado na tela
        document.getElementById("Total").innerText = total.toFixed(2);

        // CORRIGIDO: qtdXun agora é atualizado com o último item adicionado
        const ultimo = carrinho[carrinho.length - 1];
        document.getElementById("qtdXun").innerText = ultimo.quantidade + " X " + ultimo.preco.toFixed(2);
    }

    function AlertItem() {
        const alertDiv = document.getElementById("Alert");
        alertDiv.innerHTML = `<div class="alert alert-danger alert-dismissible" role="alert">
            Produto não encontrado!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
