<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Atividades</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --border: #2a2a2a;
            --accent: #c8f135;
            --accent-dim: #8aaa1f;
            --text: #e8e8e8;
            --muted: #555;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .wrapper {
            max-width: 640px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 56px;
            animation: fadeDown 0.5s ease both;
        }

        .tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 14px;
            font-size: 14px;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin: 40px 0;
        }

        .counter {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .list li {
            animation: fadeUp 0.4s ease both;
        }

        .list li:nth-child(1)  { animation-delay: 0.05s; }
        .list li:nth-child(2)  { animation-delay: 0.10s; }
        .list li:nth-child(3)  { animation-delay: 0.15s; }
        .list li:nth-child(4)  { animation-delay: 0.20s; }
        .list li:nth-child(5)  { animation-delay: 0.25s; }
        .list li:nth-child(6)  { animation-delay: 0.30s; }
        .list li:nth-child(7)  { animation-delay: 0.35s; }
        .list li:nth-child(8)  { animation-delay: 0.40s; }

        .list a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            gap: 16px;
        }

        .list a:hover {
            border-color: var(--accent);
            background: #1a1a1a;
            transform: translateX(4px);
        }

        .list a:hover .arrow {
            color: var(--accent);
            transform: translateX(3px);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .num {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            min-width: 24px;
        }

        .arrow {
            font-size: 16px;
            color: var(--muted);
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 8px;
            padding: 14px 20px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .add-btn:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
