<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Média Escolar</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div class="card">
    <div class="tag">Exercício 03</div>
    <h1>Média Escolar</h1>
    <p class="subtitle">Cálculo e situação final do aluno</p>
 
    <div class="full" style="margin-bottom:12px">
      <label for="nome">Nome do Aluno</label>
      <input type="text" id="nome" placeholder="Digite o nome completo">
    </div>
 
    <div class="grid">
      <div>
        <label for="n1">Nota 1</label>
        <input type="number" id="n1" min="0" max="10" step="0.1" placeholder="0.0">
      </div>
      <div>
        <label for="n2">Nota 2</label>
        <input type="number" id="n2" min="0" max="10" step="0.1" placeholder="0.0">
      </div>
      <div>
        <label for="n3">Nota 3</label>
        <input type="number" id="n3" min="0" max="10" step="0.1" placeholder="0.0">
      </div>
    </div>
 
    <button onclick="calcularMedia()">Calcular Resultado</button>
 
    <div class="result-box" id="resultBox">
      <div class="result-nome">Resultado de</div>
      <div class="result-aluno" id="rNome"></div>
      <div class="result-media" id="rMedia"></div>
      <div class="result-situacao" id="rSituacao"></div>
      <div class="result-extra" id="rExtra"></div>
    </div>
  </div>
  <script src="script.js"></script>
 </body>
</html>
