<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <!-- Bootstrap via CDN (substitui o local para funcionar sem a pasta bootstrap) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.92);
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-img-top {
            object-fit: cover;
            height: 280px;
            border-radius: 8px 8px 0 0;
        }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div class="d-flex flex-column align-items-center">

            <div class="card" style="width: 22rem;" aria-hidden="true">

                <!-- Imagem inicial (placeholder SVG) — será substituída pelo script -->
                <img src="img/img_.svg" class="card-img-top" alt="Placeholder Copa">

                <div class="card-body">

                    <!-- Título com nome e rank -->
                    <h5 id="Nome" class="card-title placeholder-glow">
                        <span class="placeholder col-6"></span>
                        <span id="Rank" class="badge text-bg-secondary">-</span>
                    </h5>

                    <!-- Informações do jogador como placeholders -->
                    <p class="card-text placeholder-glow">
                        <span id="Data_Nas"  class="placeholder col-4"></span><br>
                        <span id="Alutra"    class="placeholder col-4"></span><br>
                        <span id="Posição "  class="placeholder col-6"></span><br>
                    </p>

                </div>
            </div>

            <!-- Botão que chama a função revelar() do script.js -->
            <a href="#" onclick="revelar(); return false;" tabindex="-1"
               class="btn btn-primary" style="margin: 10px; padding: 10px;">
                Revelar
            </a>

        </div>
    </div>

    <!-- Bootstrap JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script da Questão 04 -->
    <script src="script.js"></script>

</body>
</html>
