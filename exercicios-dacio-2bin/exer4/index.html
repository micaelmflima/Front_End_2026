<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Bank</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cabinet+Grotesk:wght@700;800;900&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  </head>
<body>

  <div class="card">
    <div class="bank-name">∞ Infinity Bank</div>
    <h1>Simulador de Vendas</h1>
    <p class="subtitle">Cálculo de taxas e parcelas por bandeira</p>
 
    <div class="field">
      <label>Bandeira do Cartão</label>
      <select id="bandeira">
        <option value="">Selecione a bandeira</option>
        <option value="visa">Visa — 2%</option>
        <option value="master">Mastercard — 1.85%</option>
        <option value="elo">Elo — 3%</option>
      </select>
    </div>
 
    <div class="row">
      <div class="field">
        <label>Valor da Venda (R$)</label>
        <input type="number" id="valor" min="0" step="0.01" placeholder="0,00">
      </div>
      <div class="field">
        <label>Parcelas</label>
        <select id="parcelas">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
          <option value="5">5x</option>
          <option value="6">6x</option>
          <option value="12">12x</option>
        </select>
      </div>
    </div>
 
    <button onclick="calcular()">Simular</button>
 
    <div class="result-panel" id="resultPanel">
      <div class="result-header">Resumo da Transação</div>
      <div class="result-rows">
        <div class="result-row">
          <span class="result-row-label">Valor original</span>
          <span class="result-row-value" id="rValor"></span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Taxa da bandeira</span>
          <span class="result-row-value" id="rTaxa"></span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Taxa mensal (R$ 12,50/mês)</span>
          <span class="result-row-value" id="rMensal"></span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Juros (0.35%/mês)</span>
          <span class="result-row-value" id="rJuros"></span>
        </div>
        <div class="result-row">
          <span class="result-row-label">Valor total</span>
          <span class="result-row-value" id="rTotal"></span>
        </div>
      </div>
      <div class="result-total">
        <span class="result-total-label">Valor por parcela</span>
        <span class="result-total-value" id="rParcela"></span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  </body>
</html>
