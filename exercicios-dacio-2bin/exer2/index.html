<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Temperatura</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div class="card">
    <div class="tag">Exercício 02</div>
    <h1>Conversor<br>de Temperatura</h1>
    <p class="subtitle">Conversão bidirecional em tempo real</p>
 
    <div class="fields">
      <div class="field-group">
        <div class="field-label"><span class="dot-c"></span> Celsius</div>
        <input type="number" id="celsius" step="0.1" placeholder="0">
        <span class="unit-badge">°C</span>
      </div>
 
      <div class="divider">converte</div>
 
      <div class="field-group">
        <div class="field-label"><span class="dot-f"></span> Fahrenheit</div>
        <input type="number" id="fahrenheit" step="0.1" placeholder="32">
        <span class="unit-badge">°F</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  </body>
</html>
